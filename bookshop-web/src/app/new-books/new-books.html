<div class="row-duo">
  
  @for (book of featuredBooks().slice(0, 2); track book.id) {
    <div class="banner-cover" [style.background-color]="book.id === 1 ? '#f15025' : '#064e3b'" (click)="select(book)">
      <h3 class="spine">{{ book.title }}</h3>
      <p class="auth">{{ book.author }}</p>
    </div>
  }
</div>
